apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fastapi-app

  template:
    metadata:
      labels:
        app: fastapi-app

    spec:
      containers:
        - name: fastapi-app
          image: fastapi-app:v5
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fastapi-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: fastapi-config
                  key: REDIS_PORT

            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"